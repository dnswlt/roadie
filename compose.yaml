services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: roadie
      POSTGRES_PASSWORD: roadie
      POSTGRES_DB: roadie
    ports:
      - "5433:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadie"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  dbdata:
