<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Roadie</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <span class="brand">
        <img class="brand-logo" src="favicon.svg" alt="" width="20" height="20">
        Roadie
      </span>
      <div class="menu-wrap">
        <button id="rm-picker" class="rm-trigger" aria-label="Roadmap"></button>
        <div id="rm-pop" class="menu hidden"></div>
      </div>
      <div class="menu-wrap">
        <button id="rm-menu" class="icon-btn" title="Roadmap actions"></button>
        <div id="rm-menu-pop" class="menu hidden">
          <button id="rm-rename" class="menu-item">Rename</button>
          <button id="rm-duplicate" class="menu-item">Duplicate…</button>
          <button id="rm-history" class="menu-item">Version history…</button>
          <button id="rm-export" class="menu-item">Export…</button>
          <button id="rm-import" class="menu-item">Import…</button>
          <button id="rm-delete" class="menu-item menu-danger">Delete roadmap</button>
        </div>
      </div>
      <button id="rm-new" class="btn">New</button>
      <input id="rm-import-file" type="file" accept=".json,application/json" hidden>
      <div class="menu-wrap">
        <button id="lane-vis-menu" class="icon-btn" title="Show/hide contexts"></button>
        <div id="lane-vis-pop" class="menu hidden"></div>
      </div>
      <div class="menu-wrap">
        <button id="focus-menu" class="icon-btn" title="Focus on a label"></button>
        <div id="focus-pop" class="menu hidden"></div>
      </div>
      <span class="spacer"></span>
      <div class="menu-wrap">
        <button id="snap-menu" class="icon-btn" title="Snap grid"></button>
        <div id="snap-pop" class="menu hidden"></div>
      </div>
      <div class="zoom">
        <button id="zoom-fit" class="icon-btn" title="Zoom to fit"></button>
        <button id="zoom-out" class="icon-btn" title="Zoom out (Ctrl+scroll)"></button>
        <button id="zoom-in" class="icon-btn" title="Zoom in (Ctrl+scroll)"></button>
      </div>
    </header>
    <div class="main">
      <div id="snapshot-banner" class="snapshot-banner hidden"></div>
      <div id="chart" class="chart-scroll"></div>
      <div id="panel-resize" title="Drag to resize"></div>
      <aside id="panel" class="panel"></aside>
      <aside id="history" class="history"></aside>
    </div>
    <div id="toasts"></div>
    <dialog id="dialog"></dialog>
  </div>
  <script src="app.js"></script>
</body>
</html>
